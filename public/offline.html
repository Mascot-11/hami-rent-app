<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're offline — Hamro Rent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: #faf8f5;
      color: #2d1f17;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 72px; height: 72px;
      background: #7a3e28;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #78716c; font-size: 0.95rem; line-height: 1.6; max-width: 320px; }
    .badge {
      margin-top: 1.5rem;
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: #fef3c7; color: #92400e;
      border: 1px solid #fcd34d;
      border-radius: 99px;
      padding: 0.4rem 1rem;
      font-size: 0.8rem; font-weight: 500;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #f59e0b;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    button {
      margin-top: 2rem;
      background: #7a3e28; color: #faf8f5;
      border: none; border-radius: 10px;
      padding: 0.75rem 2rem;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #6b3522; }
  </style>
</head>
<body>
  <div class="icon">🏠</div>
  <h1>You're offline</h1>
  <p>No internet connection right now. Your data is saved locally — any changes you make will sync automatically when you're back online.</p>
  <div class="badge">
    <span class="dot"></span>
    Waiting for connection…
  </div>
  <button onclick="window.location.reload()">Try again</button>
  <script>
    window.addEventListener("online", () => window.location.reload());
  </script>
</body>
</html>
